services:
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  benthos:
    build:
      context: ../../..
      dockerfile: deploy/docker/e2e-tests/Dockerfile
    command: run /config/benthos-config.yaml
    depends_on:
      - mosquitto
    volumes:
      - ./benthos-config.yaml:/config/benthos-config.yaml:ro
